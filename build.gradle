plugins {
    id 'com.android.application' version '8.2.0'
}

android {
    namespace 'com.xentoradx.browser'
    compileSdk 34

    defaultConfig {
        applicationId "com.xentoradx.browser"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
