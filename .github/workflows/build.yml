name: Build Android APK & AAB

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Yeh step repositories ki problem ko jad se khatam karega
    - name: Setup Dynamic Repositories & Fix Structure
      run: |
        rm -rf app settings.gradle build.gradle
        mkdir -p app/src/main/java/com/xentoradx/browser
        
        # 1. Complete settings.gradle with repositories
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "XentoraDX-Browser"
        include ':app'
        EOF
        
        # 2. Main root build.gradle
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.0' apply false
        }
        EOF
        
        # 3. App module build.gradle
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.xentoradx.browser'
            compileSdk 34
            defaultConfig {
                applicationId "com.xentoradx.browser"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                }
            }
        }
        EOF

        # 4. Files ko sahi safe paths par move karna
        if [ -f "AndroidManifest.xml" ]; then mv AndroidManifest.xml app/src/main/; fi
        if [ -f "MainActivity.java" ]; then mv MainActivity.java app/src/main/java/com/xentoradx/browser/; fi

    - name: Initialize Gradle Wrapper
      run: gradle wrapper --gradle-version 8.2

    - name: Build APK (Debug)
      run: ./gradlew :app:assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: XentoraDX-APK
        path: app/build/outputs/apk/debug/app-debug.apk
