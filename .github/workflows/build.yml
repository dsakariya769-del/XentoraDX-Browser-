name: Build Android APK & AAB

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Files ko sahi Android structure mein automatic move karne ke liye step
    - name: Organize Project Files
      run: |
        mkdir -p app/src/main/java/com/xentoradx/browser
        mv build.gradle app/
        mv AndroidManifest.xml app/src/main/
        mv MainActivity.java app/src/main/java/com/xentoradx/browser/

    - name: Initialize Gradle Wrapper
      run: gradle wrapper --gradle-version 8.2

    - name: Build APK (Debug)
      run: ./gradlew assembleDebug

    - name: Build AAB (Release)
      run: ./gradlew bundleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: XentoraDX-APK
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload AAB (Play Store ke liye)
      uses: actions/upload-artifact@v4
      with:
        name: XentoraDX-AAB
        path: app/build/outputs/bundle/release/app-release.aab
